name: Update Activity

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Update README Activity
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://github.com/kartikeyg0104.atom"
