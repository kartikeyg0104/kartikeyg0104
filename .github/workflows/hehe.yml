name: Update Activity

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: jamesives/github-activity-readme@master
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
